<!-- 🌸 Floating Circular Music Player -->
<div id="music-player" title="SSRT Music">
  <button id="toggle-music" aria-label="SSRT Music">▶</button>
  <audio id="bg-music" src="audio/temple-bg-song.mp3" loop></audio>
</div>

<style>
  /* 🎵 Fixed circular music player styling with temple gold theme */
  #music-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #d4af37;
    box-shadow: 0 0 10px #d4af37, inset 0 0 10px #ffd700;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  #toggle-music {
    all:unset;
    font-size: 28px;
    color: #000000cc;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  #toggle-music:hover {
    background-color: #ffd700cc;
    color: #000;
  }
  #toggle-music:focus-visible {
    outline: 2px solid #ffd700;
    outline-offset: 3px;
  }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.20.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.20.0/firebase-firestore-compat.js"></script>
<script>
  // Firebase config and initialization
  const firebaseConfig = {
    apiKey: "AIzaSyCr0VADEyGazfqVC0l8okB-pana_JhIO4Q",
    authDomain: "ssrt-admin-dashboard.firebaseapp.com",
    projectId: "ssrt-admin-dashboard",
    storageBucket: "ssrt-admin-dashboard.firebasestorage.app",
    messagingSenderId: "825403765292",
    appId: "1:825403765292:web:b5cabc4e85a601f42e9789",
    measurementId: "G-T2F2MG3X84"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const eventsContainer = document.getElementById('events-container');

  // Function to create and add event cards dynamically
  function renderEvent(doc) {
    const col = document.createElement('div');
    col.className = 'col-md-6 col-lg-4';

    const card = document.createElement('div');
    card.className = 'card shadow-lg p-3 animate-on-scroll h-100';

    const img = document.createElement('img');
    img.className = 'card-img-top';
    img.style.borderRadius = '5px';
    img.style.maxHeight = '160px';
    img.style.objectFit = 'cover';

    const cardBody = document.createElement('div');
    cardBody.className = 'card-body';

    const title = document.createElement('h5');
    title.className = 'card-title';
    title.textContent = doc.data().title;

    const desc = document.createElement('p');
    desc.className = 'card-text';
    desc.innerHTML = `Date: ${doc.data().date} <br> ${doc.data().description}`;

    cardBody.appendChild(title);
    cardBody.appendChild(desc);

    // Show Register button only if showRegistration is true and registrationLink is populated
    if(doc.data().showRegistration && doc.data().registrationLink) {
      const registerBtn = document.createElement('a');
      registerBtn.className = 'btn btn-warning w-100';
      registerBtn.href = doc.data().registrationLink;
      registerBtn.target = "_blank";
      registerBtn.rel = "noopener noreferrer";
      registerBtn.textContent = doc.data().buttonText || 'Register';
      cardBody.appendChild(registerBtn);
    }

    card.appendChild(img);
    card.appendChild(cardBody);
    col.appendChild(card);

    eventsContainer.appendChild(col);
  }

  // Load all events from Firestore ordered by date and render them
  db.collection('events').orderBy('date').get()
    .then(snapshot => {
      eventsContainer.innerHTML = ''; // Clear container before adding events
      snapshot.forEach(doc => renderEvent(doc));
    })
    .catch(error => {
      console.error('Error fetching events: ', error);
      eventsContainer.innerHTML = '<p class="text-danger">Unable to load events at this time.</p>';
    });
</script>

<script>
  // Music player script copied unchanged from your original code
  const audio = document.getElementById('bg-music');
const toggleBtn = document.getElementById('toggle-music');

const savedTime = localStorage.getItem('music-time');
const wasPlaying = localStorage.getItem('music-playing') === 'true';

if (savedTime) {
  audio.currentTime = parseFloat(savedTime);
}

if (wasPlaying) {
  audio.play().catch(() => {});
  toggleBtn.textContent = "⏸";
} else {
  toggleBtn.textContent = "▶";
}

toggleBtn.addEventListener('click', () => {
  if (audio.paused) {
    audio.play();
    toggleBtn.textContent = "⏸";
    localStorage.setItem('music-playing', 'true');
  } else {
    audio.pause();
    toggleBtn.textContent = "▶";
    localStorage.setItem('music-playing', 'false');
  }
});

setInterval(() => {
  localStorage.setItem('music-time', audio.currentTime);
}, 1000);
</script>

</body>
</html>
